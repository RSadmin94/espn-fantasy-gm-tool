<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GM War Room</title>
    <style>
      body {
        font: 13px/1.4 system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        width: 280px;
        color: #e8e8e8;
        background: #121212;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
        font-weight: 600;
      }
      p {
        margin: 0 0 10px;
        color: #b0b0b0;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        background: #16a34a;
        color: #fff;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .ok {
        color: #4ade80;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .err {
        color: #f87171;
        font-size: 12px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>GM War Room</h1>
    <div id="root"></div>
    <script src="popup.js"></script>
  </body>
</html>
