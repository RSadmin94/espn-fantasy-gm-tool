# ci.yml — runs on every push and PR to main
# Catches TypeScript errors and failing tests before they reach production

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-and-test:
    name: TypeScript + Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: espn_gm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: mysql://root:testpass@127.0.0.1:3306/espn_gm_test
      JWT_SECRET: ci-test-secret-32-characters-long
      NODE_ENV: test
      ESPN_LEAGUE_ID: "1589110"
      ESPN_CRED_ENCRYPTION_KEY: ci-test-encryption-key-32-chars!!
      ANTHROPIC_API_KEY: sk-ant-test-key
      VITE_APP_ID: ci-test-app-id
      OWNER_OPEN_ID: ci-test-owner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Notify success
        if: success()
        run: echo "✅ ${{ github.sha }} — all checks passed"

      - name: Notify failure
        if: failure()
        run: echo "❌ ${{ github.sha }} — checks failed. Railway deploy blocked."
